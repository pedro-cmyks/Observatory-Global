# Fly.io configuration for Atlas backend
# Deploy from repo root: fly deploy --config fly.toml

app = "atlas-api"
primary_region = "iad"  # Washington DC — closest to GDELT servers

[build]
  dockerfile = "backend/Dockerfile"
  build_target = ""

[env]
  PORT = "8000"
  INGEST_INTERVAL_SECONDS = "900"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false   # keep alive so ingestion runs 24/7
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "60s"
    method = "GET"
    path = "/health"
    port = 8000
    timeout = "10s"
